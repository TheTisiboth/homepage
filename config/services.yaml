---
# Services are curated here by hand (Docker auto-discovery is intentionally
# disabled — see README). Add every Pi-hosted service to the right group below.

# Live time-series graphs, one card each, driven by the Glances service widget.
# Homepage polls every refreshInterval and keeps pointsLimit points, so the
# chart shows the recent evolution (CPU %, RAM, temp, storage usage).
- System:
    - CPU:
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: cpu
          chart: true
          pointsLimit: 30
          refreshInterval: 5000
    - RAM:
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: memory
          chart: true
          pointsLimit: 30
          refreshInterval: 5000
    - Temperature:
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: "sensor:cpu_thermal 0"
          chart: true
          pointsLimit: 30
          refreshInterval: 5000
    - Storage:
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: "fs:/host"
          chart: true
          pointsLimit: 30
          refreshInterval: 5000
    - Network:
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: network:eth0
          chart: true
          pointsLimit: 30
          refreshInterval: 5000
    - Disk I/O:
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: disk:mmcblk0
          chart: true
          pointsLimit: 30
          refreshInterval: 5000

- Monitoring:
    - Netdata:
        icon: netdata.png
        href: https://netdata.leojan.fr
        description: Real-time performance monitoring
        server: my-docker
        container: netdata

    - Glances:
        icon: si-grafana
        href: https://glances.leojan.fr
        description: System monitoring dashboard
        server: my-docker
        container: glances

- Infrastructure:
    - Dokploy:
        icon: docker.png
        href: https://dokploy.home.leojan.fr
        description: Container management platform
        siteMonitor: http://dokploy:3000

    - Uptime Kuma:
        icon: uptime-kuma.png
        href: https://status.leojan.fr/status/all
        description: Uptime monitoring & status page
        siteMonitor: http://uptime-kuma:3001
        widget:
          type: uptimekuma
          url: http://uptime-kuma:3001
          slug: "{{HOMEPAGE_VAR_KUMA_SLUG}}"

- Applications:
    - AdGuard Home:
        icon: adguard-home.png
        href: https://adguard.leojan.fr
        description: DNS ad blocker & privacy protection
        siteMonitor: http://adguardhome:80
        widget:
          type: adguard
          url: http://adguardhome:80
          username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"

    - Vaultwarden:
        icon: vaultwarden.png
        href: https://vault.leojan.fr
        description: Password manager (Bitwarden-compatible)
        siteMonitor: http://vaultwarden:80

    - Nextcloud:
        icon: nextcloud.png
        href: https://cloud.leojan.fr
        description: Self-hosted cloud storage & file sync
        siteMonitor: http://nextcloud:80

    - Advent Calendar:
        icon: mdi-calendar-star
        href: https://calendar.leojan.fr
        description: Interactive advent calendar app
        siteMonitor: http://adventcalendar-app-j8mrie-app-1:3006

    - Frisbee Bot:
        icon: telegram.png
        description: Ultimate Frisbee training reminder bot
        siteMonitor: http://frisbee-bot:3004/health

    - WebCV Frontend:
        icon: mdi-file-account
        href: https://leojan.fr
        description: Personal CV website
        siteMonitor: http://webcv-front:3007

    - WebCV Backoffice:
        icon: strapi.png
        href: https://admin.leojan.fr
        description: Strapi CMS — admin for the CV website
        siteMonitor: http://webcv_backend:3008
