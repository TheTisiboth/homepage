---
- greeting:
    text_size: xl
    text: Pi5 Dashboard

- datetime:
    text_size: xl
    format:
      dateStyle: long
      timeStyle: short
      hour12: false

- openmeteo:
    label: Berlin
    latitude: 52.5200
    longitude: 13.4050
    units: metric
    cache: 5

# Compact at-a-glance header block (live time-series graphs are the chart cards
# in the "System" group — see services.yaml).
- resources:
    cpu: true
    memory: true
    cputemp: true
    uptime: true
    label: Pi5
